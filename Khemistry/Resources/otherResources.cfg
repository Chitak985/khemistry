// Glacial Sulfide Ore processing
// Required for Crude ULV Circuits

// Glacial Sulfide processing chain:
//GSOre
//-> (GSWaste1) + GSSortedOre
//-> GSCrushedOre
//-> (GSWaste1) + GSConcentrate
//-> (GSNMConcentrate) + GSMConcentrate
//-> RoastedFeNiCu
//-> (FeNiCuSlag) + FeNiCu_700_200_100

// Nickel Sulfide processing chain:
//NSOre
//-> Coarse Crushed Nickel Sulfide Ore
//-> Crushed Nickel Sulfide Ore
//-> (NSWaste1) + NSConcentrate
//-> (NSNMConcentrate) + NSMConcentrate
//-> RoastedFeNiCu2
//-> (FeNiCuSlag2) + FeNiCu_644_228_128


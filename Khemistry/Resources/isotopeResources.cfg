  short = true
  name = H-6
  displayName = Hydrogen-6
  khemistryDescription = A highly unstable isotope, it decays almost instantly. Can be made by bombarding Lithium-7 with a 855 MeV electron beam. It is unknown what it decays into.
}
RESOURCE_DEFINITION
{
  short = true
  name = H-7
  displayName = Hydrogen-7
  khemistryDescription = A highly unstable isotope that can be made by bombarding hydrogen with helium-8. It is unknown what it decays into.

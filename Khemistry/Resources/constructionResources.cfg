// NOTE: Will be made from the 99.9% pure sand quartz from the Sandline
// Process:
// Get Ultra-pure silica sand (low iron content)
// Batch mixing (Soda ash + limestone + additives)
// Melting in a ~1500C furnace
// Float process: Molten glass floats on tin bath -> perfectly flat sheets
// Annealing: Slow cooling to remove internal stress
// Cutting & edge processing
// Tempering: Heat + rapid air cooling

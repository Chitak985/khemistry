///// Glass /////

// NOTE: Will be made from the 99.9% pure sand quartz from the Sandline
// Process:
// Get Ultra-pure silica sand (low iron content)
// Batch mixing (Soda ash + limestone + additives)
// Melting in a ~1500°C furnace
// Float process: Molten glass floats on tin bath → perfectly flat sheets
// Annealing: Slow cooling to remove internal stress
// Cutting & edge processing
// Tempering: Heat + rapid air cooling
RESOURCE_DEFINITION
{
  name = LowIronTemperedSodaLimeGlass
  displayName = Low-Iron Tempered Soda-Lime Glass
  abbreviation = LITSLGlass
  density = 0.001 //!TMP VALUE
  unitCost = 1 //!TMP VALUE
  isTweakable = true //!TMP VALUE
  isVisible = true
  flowMode = STAGE_PRIORITY_FLOW //!TMP VALUE
  transfer = PUMP //!TMP VALUE
  volume = 1 //!TMP VALUE
}

///// Silicon Products /////

// Process:
// Metallurgical silicon (~98-99%) goes through the Siemens process to make 99.9999% silicon
// That silicon goes through the Czochralski process (1414 C)
// Then goes through directional solidification (polycrystalline)
// Add dopant into molten silicon
// Cut into wafers (0.15 mm)

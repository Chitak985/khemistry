{
	short = true
  name = LowIronTemperedSodaLimeGlass
  displayName = Low-Iron Tempered Soda-Lime Glass
  abbreviation = LITSLGlass
  khemistryDescription = A thermally strengthened, low-iron transparent glass engineered for high light transmission and impact resistance. Commonly used as protective covers for solar panels, observation windows, and industrial enclosures where optical clarity and durability are required.
}


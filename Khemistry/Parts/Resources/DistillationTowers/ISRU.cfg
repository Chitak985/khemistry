PART
{
	name = distillationTowerSmall
	module = Part
	author = Chitak 985 YT

	MODEL
	{
		model = Khemistry/Parts/Resources/DistillationTowers/distillationTowerSmall
	}

	rescaleFactor = 1
	node_stack_bottom = 0.0, -1.5, 0.0, 0.0, -1.0, 0.0, 2
	TechRequired = advScienceTech
	entryCost = 30000
	cost = 12000
	category = Utility
	subcategory = 0
	title = Small Distillation Tower
	manufacturer = Kerbin Oil Company
	description = <color=yellow>Atmospheric Distillation Tower</color>\n<color=orange>IV Machine, uses 1 A</color>\n\nThis tower is the most important part of an oil refinery, because it turns crude oil into various useful products. This unit also comes with a desalter to ensure crude oil can be used. Be careful as it creates a lot of heat.
	attachRules = 1,1,1,0,0

	// --- standard part parameters ---
	mass = 5.25
	dragModelType = default
	maximum_drag = 0.25
	minimum_drag = 0.25
	angularDrag = 2
	crashTolerance = 5
	maxTemp = 2000 // = 3500
	bulkheadProfiles = size2, srf
	tags = #autoLOC_500654 //#autoLOC_500654 = conver isru mine )mining (ore process resource
	
	RESOURCE
	{
		name = IVEnergy
		amount = 1
		maxAmount = 1
	}
	
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Atmospheric Crude Distillation
		StartActionName = Start Atmospheric Crude Distillation
		StopActionName = Stop Atmospheric Crude Distillation
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false

		INPUT_RESOURCE:NEEDS[RealSolarSystem]
		{
			ResourceName = EarthCrudeOil
			Ratio = 50
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE:NEEDS[!RealSolarSystem]
		{
			ResourceName = KerbinCrudeOil
			Ratio = 50
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = IVEnergy
			Ratio = 1
		}
		OUTPUT_RESOURCE
		{
			ResourceName = RefineryGas
			Ratio = 1.5
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = Naphtha
			Ratio = 10.0
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = Kerosene
			Ratio = 7.5
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = Diesel
			Ratio = 12.5
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = OilResidue
			Ratio = 18.5
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
	}
}

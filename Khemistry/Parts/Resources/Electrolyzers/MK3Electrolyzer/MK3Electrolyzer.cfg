			ResourceName = 97_H2
			Ratio = 0.106
		}
		OUTPUT_RESOURCE
		{
			ResourceName = 95_O2
			Ratio = 0.844
		}
		OUTPUT_RESOURCE
		{
			ResourceName = ShoreWaterEResidue
			Ratio = 0.05
		}

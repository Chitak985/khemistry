// Adjust recipes
@PART[khemistry-MK3Electrolyzer]:BEFORE[Khemistry]
{
	// Adjust amounts
	@KHEMISTRY_RECIPE,*
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 1
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 1
		}
	}
}
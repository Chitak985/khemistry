// Adjust recipes
@PART[QBEElectrolyzer]:BEFORE[Khemistry]
{
	// Adjust amounts
	@KHEMISTRY_RECIPE,*
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 0.00007
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 0.00007
		}
		INPUT_RESOURCE
		{
			ResourceName = MVEnergy
			Ratio = 95
		}
	}
}
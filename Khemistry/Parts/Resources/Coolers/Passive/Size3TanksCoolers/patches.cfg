// Manually added recipes
@PART[khemistry-small3-cooling-tank,khemistry-medium3-cooling-tank,khemistry-large3-cooling-tank]:FIRST
{
	KHEMISTRY_RECIPE:NEEDS[!RealSolarSystem]
	{
		type = cooling
		recipeName = Cool 99.9% SiO2 Kerbin Sand
		INPUT_RESOURCE
		{
			ResourceName = HEATED_KerbinSand_99_9_SiO2
			Ratio = 1
		}
		OUTPUT_RESOURCE
		{
			ResourceName = KerbinSand_99_9_SiO2
			Ratio = 1
		}
	}
	KHEMISTRY_RECIPE:NEEDS[RealSolarSystem]
	{
		type = cooling
		recipeName = Cool 99.9% SiO2 Earth Sand
		INPUT_RESOURCE
		{
			ResourceName = HEATED_EarthSand_99_9_SiO2
			Ratio = 1
		}
		OUTPUT_RESOURCE
		{
			ResourceName = EarthSand_99_9_SiO2
			Ratio = 1
		}
	}
	KHEMISTRY_RECIPE:NEEDS[!RealSolarSystem]
	{
		type = cooling
		recipeName = Cool 75% Magnetite Kerbin Sand
		INPUT_RESOURCE
		{
			ResourceName = HEATED_KerbinSand_75_Magnetite
			Ratio = 1
		}
		OUTPUT_RESOURCE
		{
			ResourceName = KerbinSand_75_Magnetite
			Ratio = 1
		}
	}
	KHEMISTRY_RECIPE:NEEDS[RealSolarSystem]
	{
		type = cooling
		recipeName = Cool 75% Magnetite Earth Sand
		INPUT_RESOURCE
		{
			ResourceName = HEATED_EarthSand_75_Magnetite
			Ratio = 1
		}
		OUTPUT_RESOURCE
		{
			ResourceName = EarthSand_75_Magnetite
			Ratio = 1
		}
	}
}

// Adjust recipes
@PART[khemistry-small3-cooling-tank]:BEFORE[Khemistry]
{
	// Adjust amounts
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Cool?99.9%?SiO2?Kerbin?Sand]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 0.60
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 0.60
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Cool?75%?Magnetite?Kerbin?Sand]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 0.55
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 0.55
		}
	}
}

	description = <color=yellow>Event Horizon Processor</color>\n<color=orange>Uses 238000A UEV, 119000A UIV, 7450A UXV, and 2794A MAX to function.</color>\n<color=#BD2424>Will require maintenance by an Engineer if runs out of MAX energy!</color>\n\nThe Event Horizon Processor utilizes a stabilized gravitational singularity suspended within a dynamically balanced containment ring. Feedstock is injected into the singularity's tidal compression zone, where matter is forced into ultra-dense metastable phases unattainable through conventional industrial processes. Processed material is recovered through the extraction cone using directed gravitational resonance beams before accretion can occur.\n\nDue to the extreme spacetime distortions involved, uninterrupted MAX-voltage stabilization power is mandatory. Loss of the stabilization bus triggers an emergency containment scram and immediate suspension of all processing operations. Following such an event, the stabilization ring must be recalibrated by a qualified engineer before the singularity can be safely brought back to operational parameters.\n\n<i>"The difference between a manufacturing facility and a celestial disaster is approximately 2.1 billion volts."</i>

PART
{
	name = NameConverterRadial
	module = Part
	author = Chitak 985 YT

	MODEL
	{
		model = Squad/Parts/Resources/FuelCell/FuelCell  // Change later
	}
	rescaleFactor = 1

	node_attach = 0, 0, 0, 1, 0, 0, 0

	TechRequired = electrics
	entryCost = 2250
	cost = 750
	category = Utility
	subcategory = 0
	title = Radial Name Converter
	manufacturer = #autoLOC_501636 //#autoLOC_501636 = Zaltonic Electronics
	description = <color=yellow>Name Converter</color>\n<color=orange>??? Machine, uses ??? A</color>\n\nHave you ever given a machine sand and it claims it to be dirt? This handy box with a few wires will rename items to make them usable in recipes that you need! Just don't rename Californium-252 to Packaged Meals and feed it to a kerbal.
	attachRules = 0,1,0,0,0

	// --- standard part parameters ---
	mass = 0.03
	dragModelType = default
	maximum_drag = 0.2
	minimum_drag = 0.2
	angularDrag = 2
	crashTolerance = 7
	maxTemp = 1900
	bulkheadProfiles = srf
	tags = #autoLOC_500648 //#autoLOC_500648 = array bank charge convert e/c elect energ pack power volt watt

	MODULE:NEEDS[!RealSolarSystem,!SolSystem]
	{
		name = ModuleResourceConverter
		ConverterName = Convert Kerbin Deserts Soil to Kerbin Sand
		StartActionName = Start converting Kerbin Deserts Soil to Kerbin Sand
		StopActionName = Stop converting Kerbin Deserts Soil to Kerbin Sand
		ToggleActionName = Toggle converting Kerbin Deserts Soil to Kerbin Sand
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false
		INPUT_RESOURCE
		{
			ResourceName = KerbinDesertsSoil
			Ratio = 5
			FlowMode = STAGE_PRIORITY_FLOW
		}
		INPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 1
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = KerbinSand
			Ratio = 5
			DumpExcess = false
		}
	}

	MODULE:NEEDS[SolSystem]
	{
		name = ModuleResourceConverter
		ConverterName = Convert Earth Hot Deserts Soil to Earth Sand

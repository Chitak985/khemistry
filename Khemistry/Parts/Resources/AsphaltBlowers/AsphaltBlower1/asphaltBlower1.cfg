PART
{
	name = asphaltBlower1
	module = Part
	author = Chitak 985 YT

	MODEL
	{
		model = Khemistry/Parts/Resources/AsphaltBlowers/AsphaltBlower1/asphaltBlower1
	}

	rescaleFactor = 1
	node_stack_top = 0.0, 1.15017, 0.0, 0.0, 1.0, 0.0, 2
	node_stack_bottom = 0.0, -1.1, 0.0, 0.0, -1.0, 0.0, 3
	TechRequired = advScienceTech
	entryCost = 10000
	cost = 2500
	category = Utility
	subcategory = 0
	title = Small Asphalt Blower
	manufacturer = Kerbin Oil Company
	description = <color=yellow>Asphalt Blower</color>\n<color=orange>EV Machine, uses between 2 and 4 A</color>\n\nThis asphalt blower turns bitumen derived from a distillation tower into usable asphalt. This machine has two modes: full-blown asphalt and semi-blown asphalt.
	attachRules = 1,1,1,0,0

	// --- standard part parameters ---
	mass = 13.5
	dragModelType = default
	maximum_drag = 0.1
	minimum_drag = 0.1
	angularDrag = 2
	crashTolerance = 4
	maxTemp = 2000 // = 3500
	bulkheadProfiles = size2, srf
	tags = #autoLOC_500654 //#autoLOC_500654 = conver isru mine )mining (ore process resource

	RESOURCE
	{
		name = EVEnergy
		amount = 4
		maxAmount = 4
	}

	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Full-Blown Asphalt Production
		StartActionName = Start Full-Blown Asphalt Production
		StopActionName = Stop Full-Blown Asphalt Production
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false

		INPUT_RESOURCE:NEEDS[RealSolarSystem]
		{
			ResourceName = EarthAir
			Ratio = 5
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE:NEEDS[!RealSolarSystem]
		{
			ResourceName = KerbinAir
			Ratio = 5
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = OilResidue
			Ratio = 20
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = EVEnergy
			Ratio = 4
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = FullBlownAsphalt
			Ratio = 23.8
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = AsphaltOffgas
			Ratio = 1.2
			DumpExcess = true
			FlowMode = STAGE_PRIORITY_FLOW
		}
	}
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Semi-Blown Asphalt Production
		StartActionName = Start Semi-Blown Asphalt Production
		StopActionName = Stop Semi-Blown Asphalt Production
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false
		
		INPUT_RESOURCE:NEEDS[RealSolarSystem]
		{
			ResourceName = EarthAir
			Ratio = 2
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE:NEEDS[!RealSolarSystem]
		{
			ResourceName = KerbinAir
			Ratio = 2
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = OilResidue
			Ratio = 25
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = EVEnergy
			Ratio = 2
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = SemiBlownAsphalt
			Ratio = 26.3
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = AsphaltOffgas
			Ratio = 0.7
			DumpExcess = true
			FlowMode = STAGE_PRIORITY_FLOW
		}
	}
}

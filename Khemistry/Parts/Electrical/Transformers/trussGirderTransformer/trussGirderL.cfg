@PART[trussGirderTransformer]:BEFORE[Khemistry]
{
	// Adjust amounts
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?MV?to?HV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 2000
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 2000
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?MV?to?EV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 500
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 500
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?HV?to?EV]]
	{
		@INPUT_RESOURCE,*

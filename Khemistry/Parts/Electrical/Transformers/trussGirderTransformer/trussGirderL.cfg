			@Ratio *= 500
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?EV?to?HV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 500
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 500
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?EV?to?MV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 500
		}
		@OUTPUT_RESOURCE,*

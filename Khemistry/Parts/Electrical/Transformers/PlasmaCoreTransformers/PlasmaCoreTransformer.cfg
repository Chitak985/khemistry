// Manually added recipes
@PART[PlasmaCoreTransformers1]:FIRST
{
	KHEMISTRY_RECIPE
	{
		type = transformer
		recipeName = Step Up LV to MV
		INPUT_RESOURCE
		{
			ResourceName = LVEnergy
			Ratio = 4
		}
		OUTPUT_RESOURCE
		{
			ResourceName = MVEnergy
			Ratio = 1
		}
	}
	KHEMISTRY_RECIPE
	{
		type = transformer
		recipeName = Step Down MV to LV
		OUTPUT_RESOURCE
		{
			ResourceName = LVEnergy
			Ratio = 4
		}
		INPUT_RESOURCE
		{
			ResourceName = MVEnergy
			Ratio = 1
		}
	}
}

@PART[PlasmaCoreTransformers1]:BEFORE[Khemistry]
{
	// Adjust amounts
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?LV?to?MV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 200000000
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 200000000
		}
		INPUT_RESOURCE
		{
			ResourceName = EVEnergy
			Ratio = 1563
		}
		INPUT_RESOURCE
		{
			ResourceName = IVEnergy
			Ratio = 1953
		}
		INPUT_RESOURCE
		{
			ResourceName = LuVEnergy
			Ratio = 391
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?MV?to?LV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 200000000
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 200000000
		}
		INPUT_RESOURCE
		{
			ResourceName = EVEnergy
			Ratio = 1563
		}
		INPUT_RESOURCE
		{
			ResourceName = IVEnergy
			Ratio = 1953
		}
		INPUT_RESOURCE
		{
			ResourceName = LuVEnergy
			Ratio = 391
		}
	}
}
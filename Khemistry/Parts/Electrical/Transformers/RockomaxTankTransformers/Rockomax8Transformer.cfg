@PART[Rockomax8Transformer]:BEFORE[Khemistry]
{
	// Adjust amounts
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?EV?to?IV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 256
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 256
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?IV?to?LuV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 64
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 64
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?LuV?to?ZPM]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 16
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 16
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Up?ZPM?to?UV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 4
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 4
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?IV?to?EV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 256
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 256
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?LuV?to?IV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 64
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 64
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?ZPM?to?LuV]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 16
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 16
		}
	}
	@KHEMISTRY_RECIPE,*:HAS[#recipeName[Step?Down?UV?to?ZPM]]
	{
		@INPUT_RESOURCE,*
		{
			@Ratio *= 4
		}
		@OUTPUT_RESOURCE,*
		{
			@Ratio *= 4
		}
	}
}
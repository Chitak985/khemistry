KHEMISTRY_RECIPE:NEEDS[!RealSolarSystem,!SolSystem]
{
	recipeType = nameConversion
	ConverterName = Convert Kerbin Deserts Soil to Kerbin Sand
	INPUT_RESOURCE
	{
		ResourceName = KerbinDesertsSoil
		Ratio = 1
		FlowMode = STAGE_PRIORITY_FLOW
	}
	OUTPUT_RESOURCE
	{
		ResourceName = KerbinSand
		Ratio = 1
		DumpExcess = false
	}
}


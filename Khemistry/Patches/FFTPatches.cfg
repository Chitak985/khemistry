//Parts/Resources
//This guy should have 63000000 kW heat but uhh no
@PART[fft-antimatter-factory-1]:NEEDS[FarFutureTechnologies]:FOR[Khemistry]
{
  RESOURCE
  {
    name = UEVEnergy
    amount = 21458
    maxAmount = 21458
  }
  @MODULE[ModuleResourceConverter]:HAS[#moduleID[lightElements]]
  {
    @INPUT_RESOURCE:HAS[#ResourceName[ElectricCharge]]
    {
      @ResourceName = UEVEnergy
			@Ratio = 11444
    }
    @INPUT_RESOURCE:HAS[#ResourceName[LqdHydrogen]]
    {
      @ResourceName = H2
      @Ratio = 0.0025
    }
    @OUTPUT_RESOURCE:HAS[#ResourceName[Antimatter]]
    {
      @Ratio = 5.8E-8
    }
  }
  @MODULE[ModuleResourceConverter]:HAS[#moduleID[heavyElements]]
  {
    @INPUT_RESOURCE:HAS[#ResourceName[ElectricCharge]]
    {
      @ResourceName = UEVEnergy
			@Ratio = 21458
    }
    @INPUT_RESOURCE:HAS[#ResourceName[FissionPellets]]
    {
      @ResourceName = UO2Pellets
      @Ratio = 8
    }
    @OUTPUT_RESOURCE:HAS[#ResourceName[Antimatter]]
    {
      @Ratio = 6.5E-7
    }
  }
}
@PART[fft-nuclear-smelter-375-1]:NEEDS[FarFutureTechnologies]:FOR[Khemistry]
{
	// Change nuclear salt water recipe
  @MODULE[ModuleSystemHeatConverter][#moduleID[nswConverter]]
  {
    @INPUT_RESOURCE:HAS[#ResourceName[Ore]]
    {
      @ResourceName = Br4
    }
    INPUT_RESOURCE
    {
      ResourceName = H2O
      Ratio = 2
      FlowMode = STAGE_PRIORITY_FLOW
    }
  }
	// Change uranium powder recipe
  @MODULE[ModuleSystemHeatConverter][#moduleID[fissionDustConverter]]
  {
    @INPUT_RESOURCE:HAS[#ResourceName[EnrichedUranium]]
    {
      @ResourceName = UO2
    }
		@OUTPUT_RESOURCE
		{
			@ResourceName = UO2Powder
		}
  }
	// Change uranium pellets recipe
  @MODULE[ModuleSystemHeatConverter]:HAS[#moduleID[fissionPelletsConverter]]
  {
    @INPUT_RESOURCE:HAS[#ResourceName[EnrichedUranium]]
    {
      @ResourceName = UO2Powder
    }
		@OUTPUT_RESOURCE
		{
			@ResourceName = UO2Pellets
		}
  }
	// Add explodium extraction recipe
	MODULE:NEEDS[!RealSolarSystem]
  {
    name = ModuleSystemHeatConverter
    // must be unique
    moduleID = explodiumExtraction
    // ModuleSystemHeat moduleID to link to
    systemHeatModuleID = isru
    // The shutdown temperature of the part
    shutdownTemperature = 1000

    // The temperature the system contributes to loops
    systemOutletTemperature = 600

    // Map loop temperature to system efficiency (0-1.0)
    systemEfficiency
    {
        key = 0 0.0
        key = 600 1.0
        key = 1000 1.0
        key = 1300 0.0
    }
    // Map system outlet temperature (K) to heat generation (kW)
    // Heat generation (kW)
    systemPower = 100

    ConverterName = Eve Soil Explodium Extraction
    StartActionName = Start Eve Soil Explodium Extraction
    StopActionName = Stop Eve Soil Explodium Extraction
    ToggleActionName = Toggle Eve Soil Explodium Extraction
    AutoShutdown = true
    GeneratesHeat = false
    DefaultShutoffTemp = .8
    UseSpecialistBonus = true
    SpecialistEfficiencyFactor = 0.2
    SpecialistBonusBase = 0.05
    ExperienceEffect = ConverterSkill
    EfficiencyBonus = 1


    INPUT_RESOURCE
    {
      ResourceName = EveSoil
      FlowMode = STAGE_PRIORITY_FLOW
      Ratio = 1
    }
		INPUT_RESOURCE
    {
      ResourceName = H2O
      FlowMode = STAGE_PRIORITY_FLOW
      Ratio = 10
    }
    INPUT_RESOURCE
    {
      ResourceName = ElectricCharge
      Ratio = 150
    }
    OUTPUT_RESOURCE
    {
      ResourceName = H2O2
      Ratio = 0.0005
      DumpExcess = false
    }
		// The following are basalt rock components
		OUTPUT_RESOURCE
    {
      ResourceName = Fe
      Ratio = 0.002
      DumpExcess = false
    }
		OUTPUT_RESOURCE
    {
      ResourceName = Mg
      Ratio = 0.001
      DumpExcess = false
    }
		OUTPUT_RESOURCE
    {
      ResourceName = Ca
      Ratio = 0.001
      DumpExcess = false
    }
		OUTPUT_RESOURCE
    {
      ResourceName = SiO2
      Ratio = 0.01
      DumpExcess = false
    }
  }
	// Add basaltic rock extraction recipe
	MODULE:NEEDS[RealSolarSystem]
  {
    name = ModuleSystemHeatConverter
    // must be unique
    moduleID = basaltRockExtraction
    // ModuleSystemHeat moduleID to link to
    systemHeatModuleID = isru
    // The shutdown temperature of the part
    shutdownTemperature = 1000

    // The temperature the system contributes to loops
    systemOutletTemperature = 600

    // Map loop temperature to system efficiency (0-1.0)
    systemEfficiency
    {
        key = 0 0.0
        key = 600 1.0
        key = 1000 1.0
        key = 1300 0.0
    }
    // Map system outlet temperature (K) to heat generation (kW)
    // Heat generation (kW)
    systemPower = 100

    ConverterName = Venus Basaltic Rock Extraction
    StartActionName = Start Venus Basaltic Rock Extraction
    StopActionName = Stop Venus Basaltic Rock Extraction
    ToggleActionName = Toggle Venus Basaltic Rock Extraction
    AutoShutdown = true
    GeneratesHeat = false
    DefaultShutoffTemp = .8
    UseSpecialistBonus = true
    SpecialistEfficiencyFactor = 0.2
    SpecialistBonusBase = 0.05
    ExperienceEffect = ConverterSkill
    EfficiencyBonus = 1


    INPUT_RESOURCE
    {
      ResourceName = VenusSoil
      FlowMode = STAGE_PRIORITY_FLOW
      Ratio = 1
    }
		INPUT_RESOURCE
    {
      ResourceName = H2O
      FlowMode = STAGE_PRIORITY_FLOW
      Ratio = 10
    }
    INPUT_RESOURCE
    {
      ResourceName = ElectricCharge
      Ratio = 150
    }
		// The following are basalt rock components
		OUTPUT_RESOURCE
    {
      ResourceName = Fe
      Ratio = 0.02
      DumpExcess = false
    }
		OUTPUT_RESOURCE
    {
      ResourceName = Mg
      Ratio = 0.01
      DumpExcess = false
    }
		OUTPUT_RESOURCE
    {
      ResourceName = Ca
      Ratio = 0.01
      DumpExcess = false
    }
		OUTPUT_RESOURCE
    {
      ResourceName = SiO2
      Ratio = 0.1
      DumpExcess = false
    }
  }
}


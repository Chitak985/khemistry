//Parts/Reactors/Fusion
@PART[fft-fusion-reactor-25-1]:NEEDS[FarFutureTechnologies]:FOR[Khemistry]
{
  // FusionReactor has no output customization, using ISRU instead
  !MODULE[ModuleSystemHeat] {}
  !MODULE[FusionReactor] {}
  RESOURCE
  {
    name = UVEnergy
    amount = 3646
    maxAmount = 3646
  }
  MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Fuse Deuterium and Deuterium
		StartActionName = Start fusing Deuterium and Deuterium
		StopActionName = Stop fusing Deuterium and Deuterium
		ToggleActionName = Toggle fusing Deuterium and Deuterium
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false
		INPUT_RESOURCE
		{
			ResourceName = H-2
			Ratio = 0.0000109
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = UVEnergy
			Ratio = 1818
			DumpExcess = false
		}
	}
  MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Fuse Deuterium and Helium-3
		StartActionName = Start fusing Deuterium and Helium-3
		StopActionName = Stop fusing Deuterium and Helium-3
		ToggleActionName = Toggle fusing Deuterium and Helium-3
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false
		INPUT_RESOURCE
		{
			ResourceName = H-2
			Ratio = 2.18E-06
			FlowMode = STAGE_PRIORITY_FLOW
		}
		INPUT_RESOURCE
		{
			ResourceName = He-3
			Ratio = 8.72E-06
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = UVEnergy
			Ratio = 3646
			DumpExcess = false
		}
	}
}

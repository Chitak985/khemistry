// Patches that are not for something specific, mostly for fixing various errors.

// Creates an Ore tank type in a special way to bypass Khemistry patches
// This fixes the fatal b9 part switch error caused by some random NearFutureStructural getting an Ore subtype in a weird way
B9_TANK_TYPE
{
	name = IAmInvincible
	tankMass = 0.1
	tankCost = 1
}
@B9_TANK_TYPE[IAmInvincible]:FINAL
{
	@name = Ore
	RESOURCE:HAS[!RealSolarSystem]
	{
		name = KerbinSoil
		unitsPerVolume = 5
	}
	RESOURCE:HAS[RealSolarSystem]
	{
		name = EarthSoil
		unitsPerVolume = 5
	}
}

// Logic for the "short" resources
@RESOURCE_DEFINITION:FINAL
{
	// name and displayName are required
	&abbreviation = #$name$  //default to name since it's often that anyway
	&density = 0.001  //default to the normal 1 kg
	&unitCost = 1  //minimal cost, barely matters anyway
	&isTweakable = true
	&isVisible = true
	&flowMode = STAGE_PRIORITY_FLOW
	&transfer = PUMP
	&volume = 1 //default to 1:1 storage values, this should pretty much never be anything other than 1
}
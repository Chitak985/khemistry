	{
		@name = EVEnergy
		@amount = 50
		@maxAmount = 50
	}
}
// Z-4k
@PART[batteryBankLarge]:FINAL
{
	@description = <color=yellow>Lithium Battery</color>\n<color=orange>IV, stores 40 A</color>\n\nNew advances in surge control technology made The Z-4K, the largest battery pack ever put into production a reality. While Zaltonic admits intense electrical discharges can be really cool, shorting the Z-4K's contacts should probably be avoided.
	@RESOURCE[ElectricCharge]
	{
		@name = IVEnergy
		@amount = 40
		@maxAmount = 40
	}
}

// Small Inline Reaction Wheel
@PART[sasModule]:FINAL
{
	@description = <color=yellow>Reaction Wheels</color>\n<color=orange>LV, uses 16 A</color>\n\nThe inline reaction wheel system uses a series of spinning discs that are going "Very Fast", to generate the torque necessary to control a spacecraft without wasting any propellant. Please do not attempt to service this device while it is running.
	@MODULE[ModuleReactionWheel]
	{
		@RESOURCE[ElectricCharge]
		{
			@name = LVEnergy
			@rate = 16
		}
	}
}
// Advanced Inline Stabilizer
@PART[advSasModule]:FINAL
{
	@description = <color=yellow>Reaction Wheels</color>\n<color=orange>MV, uses 16 A</color>\n\nThe Advanced Inline Stabilizer module containing a larger, heavier array of reaction wheels. These spin very quickly to create torque without wasting propellant. These larger wheels are driven by proportionally larger electric motors, so keep an eye on your Electricity levels.
	@MODULE[ModuleReactionWheel]
	{
		@RESOURCE[ElectricCharge]
		{
			@name = MVEnergy
			@rate = 16
		}
	}
}
// Advanced Reaction Wheel Module, Large
@PART[asasmodule1-2]:FINAL
{
	@description = <color=yellow>Reaction Wheels</color>\n<color=orange>HV, uses 12 A</color>\n\nAfter many years of research, STEADLER Corps rocket engineers discovered that large flywheels were necessary to keep large ships under control. The "Advanced Reaction Wheel Module, Large" addresses that issue by its use of patented Large Flywheels™ to provide "More Torque" (patent pending). STEADLER promptly dismissed all criticism concerning the necessity of so much research work, stating that 'it only sounds so simple now that we've figured it out'. Critics remain skeptical, but none can disagree that this module does indeed pack a lot more punch than previous models. It also needs a lot more power, but STEADLER is currently carrying out intense research work on why that is.
	@MODULE[ModuleReactionWheel]
	{
		@RESOURCE[ElectricCharge]
		{
			@name = HVEnergy
			@rate = 12
		}
	}
}


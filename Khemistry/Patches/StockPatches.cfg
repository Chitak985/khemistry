// ----- ELECTRIC PATCHES -----
// OX-10L
@PART[solarPanelOX10L]:FINAL
{
	@description = <color=yellow>Solar Panel Generator</color>\n<color=orange>MV Machine, makes 13 A</color>\n\nA larger version of the OX-4 series of solar panels.  Includes advanced heat radiators, and a deploying bracket to keep the panels clear of other senstive instruments on the craft. Warning: Not retractable once deployed
	@MODULE[ModuleDeployableSolarPanel]
	{
		@resourceName = MVEnergy
		@chargeRate = 13
	}
}
// SP-10L
@PART[solarPanelSP10L]:FINAL
{
	@description = <color=yellow>Solar Panel Generator</color>\n<color=orange>MV Machine, makes 13 A</color>\n\nThis enhanced version of the SP series photovoltaic panels provides improved power generation by increasing solar array area by a full five fold.  The SP model as always includes a case to allow the panel to be retracted when its not needed or when keeping it deployed could mean damage to the sensitive panels.
	@MODULE[ModuleDeployableSolarPanel]
	{
		@resourceName = MVEnergy
		@chargeRate = 13
	}
}
// OX-10C

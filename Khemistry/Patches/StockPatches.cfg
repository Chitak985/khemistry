// Z-400
@PART[ksp_r_largeBatteryPack]:FINAL
{
	@description = <color=yellow>Lithium Battery</color>\n<color=orange>HV, stores 80 A</color>\n\nThe Z-400 battery pack is a versatile, compact electrical charge storage solution designed for heavier loads than AAAA batteries can handle. Uses Lithium to be able to store much more energy.
	@RESOURCE[ElectricCharge]
	{
		@name = HVEnergy
		@amount = 80
		@maxAmount = 80

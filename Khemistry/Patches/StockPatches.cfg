// Z-1k
@PART[batteryBank]:FINAL
{
	@description = <color=yellow>Lithium Battery</color>\n<color=orange>EV, stores 50 A</color>\n\nThe Z-1k is a stackable battery bank, with higher voltages than the previous batteries in the series, although this comes at a cost of reduced energy storage.

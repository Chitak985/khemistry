// ----- REMOVE STOCK CONVERTING -----
@PART[ISRU]:FINAL
{
	!MODULE[ModuleResourceConverter],*
}

// ----- PACKAGED MEALS -----
@PART[ISRU]:FINAL
{
	MODULE
	{
		name = ModuleResourceConverter
		ConverterName = Meal Packaging
		StartActionName = Start Meal Packaging
		StopActionName = Stop Meal Packaging
		AutoShutdown = true
		TemperatureModifier
		{
			key = 0 10000
			key = 750 5000
			key = 1000 1000
			key = 1250 50
			key = 2000 5
			key = 4000 0
		}				
		GeneratesHeat = true  // I'm afraid to turn this off lmfao
		DefaultShutoffTemp = .8
		ThermalEfficiency 
		{
			key = 0 0 0 0
			key = 500 0.1 0 0
			key = 1000 1.0 0 0
			key = 1250 0.1 0 0
			key = 3000 0 0 0 
		}
		
		UseSpecialistBonus = true
		SpecialistEfficiencyFactor = 0.3
		SpecialistBonusBase = 0.1
		UseSpecialistHeatBonus = true
		SpecialistHeatFactor = 0.2
		ExperienceEffect = ConverterSkill
		EfficiencyBonus = 1
		resourceOutputName = Packaged Meals

		// Maybe a balanced diet?
		INPUT_RESOURCE
		{
			ResourceName = Cx(H2O)y
			Ratio = 0.2
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = C18H32O2
			Ratio = 0.2
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = C3H5(OCOR)3
			Ratio = 0.2
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = C12(H2O)11
			Ratio = 0.1
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = C18H32O2
			Ratio = 0.2
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = R-CH(NH2)-COOH
			Ratio = 0.1
			FlowMode = STAGE_PRIORITY_FLOW
  		}
		INPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 20
		}
		OUTPUT_RESOURCE
		{
			ResourceName = PackagedMeals
			Ratio = 1
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
	}
}


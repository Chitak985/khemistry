// Z-100
@PART[batteryPack]:FINAL
{
	@description = <color=yellow>Nickel-Metal Hydride Battery</color>\n<color=orange>LV, stores 50 A</color>\n\nThe Z-100 battery pack is the standard model for electrical applications. Holds two (2) Nickel-Metal Hydride AAAA batteries.
	@RESOURCE[ElectricCharge]
	{
		@name = LVEnergy
		@amount = 50
		@maxAmount = 50
	}

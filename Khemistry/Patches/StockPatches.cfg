	@description = <color=yellow>Nickel-Metal Hydride Battery</color>\n<color=orange>MV, stores 40 A</color>\n\nThe Z-200 is a stackable variant of the Z-100 battery pack, with increased capacity. In emergency situations, please refrain from "reversing the polarity".
	@RESOURCE[ElectricCharge]
	{
		@name = MVEnergy
		@amount = 40
		@maxAmount = 40
	}

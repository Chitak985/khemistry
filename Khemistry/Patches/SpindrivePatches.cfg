// This is for the spindrive reupload mod, https://github.com/zezuelde/SpinDrive-Reupload

@RESOURCE_DEFINITION[EnrichedAstrophage]
{
	khemistryDescription = The astrophage is a tiny entity capable of storing massive amounts of energy, somehow utilizing it, hovering above ultra hot stellar plasma, and still thriving and reproducing there. Why is it capable of doing such things? There is only one possible answer: an interdimensional connection to a different pocket dimension where the astrophage is able to interact with energy, construct copies of itself, and dedicate its body in our dimension to surviving intense heat. Its ability to move around is caused by a direct tunnel to the portable astrophage dimension, from which an ion beam is sent to propel the object. We are still not entirely sure how it is capable of creating new portable dimensions when it reproduces, but it may just be a multidimensional entity whose pocket dimension splits with its form in our dimension. Nonetheless, this allows us to utilize that pocket dimension in various ways, such as beaming enormous amounts energy into the astrophage to store it without using up space in our dimension.
}
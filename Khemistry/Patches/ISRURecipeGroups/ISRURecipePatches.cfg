// These are not really patches, but they contain data for ISRU recipes to be easily put into parts.
// To avoid MM stupidity, all recipes are pasted into parts myself.

// Patch ordering:
// Insert at :FIRST
// Modify values and insert additional inputs/outputs at :BEFORE[Khemistry]
// Insert ISRU info at :FOR[Khemistry]
// Rename to ISRUs at :FINAL

@PART:HAS[@KHEMISTRY_RECIPE]:FOR[Khemistry]
{
	@KHEMISTRY_RECIPE,*
	{
		name = ModuleResourceConverter  // don't use this for identification, it's present in every recipe
		ConverterName = #$recipeName$
		StartActionName = #Start $recipeName$
		StopActionName = #Stop $recipeName$
		ToggleActionName = #Toggle $recipeName$
		FillAmount = 0.95
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = false
		@INPUT_RESOURCE,*
		{
			FlowMode = STAGE_PRIORITY_FLOW
		}
		@OUTPUT_RESOURCE,*
		{
			DumpExcess = false
		}
	}
}

@PART:HAS[@KHEMISTRY_RECIPE]:FINAL
{
	// Rename to be recognized by KSP
	@KHEMISTRY_RECIPE,*
	{
		|_ = MODULE
	}
}

